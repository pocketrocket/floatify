name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      # Auto-merge low-risk updates: individual minor/patch, the minor-and-patch
      # group (defined in dependabot.yml as minor+patch only), and the
      # github-actions group. Majors and requirement-updates (update-type null,
      # e.g. constraint loosening) are deliberately left for review.
      - name: Auto-merge minor, patch & groups
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.dependency-group == 'minor-and-patch' || steps.meta.outputs.dependency-group == 'github-actions' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
